version: '3.8'

services:
  ava-monitor:
    build: .
    container_name: ava-monitor
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Propojení složky na hostiteli s kontejnerem, abychom mohli aktualizovat kód bez nutnosti rebuildování
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    # network: pokud máte specifickou síť pro Cloudflared, odkomentujte řádky níže
    # networks:
    #   - cloudflare-net

# networks:
#   cloudflare-net:
#     external: true
#     name: cloudflare_network # Změňte na název vaší sítě
